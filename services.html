<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services — The Wellness House | Dr. Zoyara Reyes</title>
  <meta name="description" content="Massage & bodywork, chiropractic care, and wellness consultations. Boutique sessions in-office or at home in Orlando, FL.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Hanken+Grotesk:wght@300;400;500;600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:#F4F1EA;--linen:#EBE6DB;--surface:#FCFBF7;--stone:#D7D0C2;
      --ink:#23241E;--ink-soft:#4F5046;--ink-muted:#857F71;
      --sage:#6F8060;--forest:#232C1E;--radius:14px;
      --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s6:24px;--s8:32px;--s10:40px;--s12:48px;--s16:64px;--s20:80px;--s24:96px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Hanken Grotesk',sans-serif;font-size:16px;line-height:1.6;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
    img{display:block;max-width:100%;height:auto}
    a{color:inherit;text-decoration:none}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;background:rgba(244,241,234,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.07)}
    .nav-inner{width:100%;max-width:1200px;margin:0 auto;padding:0 var(--s8);display:flex;align-items:center;justify-content:space-between;gap:var(--s8)}
    .nav-logo{display:flex;align-items:center;gap:10px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ink)}
    .nav-logo svg{width:28px;height:28px;flex-shrink:0}
    .nav-links{display:flex;gap:var(--s8);list-style:none}
    .nav-links a{font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);transition:color 150ms}
    .nav-links a:hover,.nav-links a.active{color:var(--ink)}
    .nav-cta{display:flex;align-items:center;gap:var(--s4)}
    .nav-book{font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:8px 18px;border:1px solid var(--ink);border-radius:100px;color:var(--ink);transition:background 200ms,color 200ms}
    .nav-book:hover{background:var(--ink);color:var(--surface)}
    @media(max-width:860px){.nav-links{display:none}}

    .btn{display:inline-flex;align-items:center;gap:var(--s2);font-family:'Jost',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:13px var(--s8);border-radius:100px;border:none;cursor:pointer;transition:background 200ms,color 200ms}
    .btn-dark{background:var(--forest);color:var(--surface)}
    .btn-dark:hover{background:#3a4c30}

    .eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s4)}
    .eyebrow::before{content:'—';opacity:.5}
    .eyebrow-sage{color:var(--sage)}

    .page-hero{padding-top:calc(60px + var(--s16));padding-bottom:var(--s12);background:var(--linen)}
    .page-hero-inner{max-width:1200px;margin:0 auto;padding:0 var(--s8)}
    .page-hero h1{font-family:'Hanken Grotesk',sans-serif;font-size:clamp(36px,5vw,60px);font-weight:300;line-height:1.05;letter-spacing:-.02em;margin-bottom:var(--s4)}
    .page-hero h1 em{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;color:var(--sage)}
    .page-hero p{font-size:16px;color:var(--ink-muted);line-height:1.7;max-width:500px}

    .section-wrap{max-width:1200px;margin:0 auto;padding:var(--s20) var(--s8)}
    .section-label{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--sage);display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s4)}
    .section-label::before{content:'—';opacity:.5}
    .section-title{font-family:'Hanken Grotesk',sans-serif;font-size:clamp(26px,3.5vw,40px);font-weight:300;line-height:1.1;letter-spacing:-.01em;margin-bottom:var(--s3)}
    .section-intro{font-size:16px;color:var(--ink-muted);line-height:1.7;max-width:560px;margin-bottom:var(--s10)}

    .massage-bg{background:var(--linen)}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s4)}
    @media(max-width:900px){.cards{grid-template-columns:1fr;max-width:480px}}
    .card{background:var(--surface);border:1px solid rgba(0,0,0,.07);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
    .card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
    .card-body{padding:var(--s6);flex:1;display:flex;flex-direction:column;gap:var(--s3)}
    .card-duration{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--sage)}
    .card-title{font-family:'Hanken Grotesk',sans-serif;font-size:22px;font-weight:400;color:var(--ink);line-height:1.2}
    .card-desc{font-size:14px;line-height:1.7;color:var(--ink-muted);flex:1}
    .card-price{border-top:1px solid var(--linen);padding-top:var(--s4);margin-top:auto;font-family:'Jost',sans-serif;font-size:17px;font-weight:500;color:var(--ink)}
    .card-price small{display:block;font-size:12px;font-weight:400;color:var(--ink-muted);margin-top:2px}

    .chiro-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s6)}
    @media(max-width:800px){.chiro-grid{grid-template-columns:1fr}}
    .chiro-card{background:var(--surface);border:1px solid rgba(0,0,0,.07);border-radius:var(--radius);padding:var(--s8);display:flex;flex-direction:column;gap:var(--s4)}
    .chiro-head{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s4)}
    .chiro-title{font-family:'Hanken Grotesk',sans-serif;font-size:26px;font-weight:300;color:var(--ink)}
    .chiro-badge{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);background:rgba(111,128,96,.1);padding:4px 12px;border-radius:100px;white-space:nowrap;margin-top:4px}
    .chiro-sub{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted)}
    .chiro-desc{font-size:15px;line-height:1.75;color:var(--ink-muted)}
