<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="Architectural, restrained — not bubbly" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); }
  .wrap { padding: 26px 32px; display: flex; gap: 22px; align-items: flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box { width: 74px; height: 56px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-xs); }
  .lab { font-size: 11px; color: var(--text-body); font-weight: 500; }
  .v { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lab">xs</span><span class="v">2px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm</span><span class="v">4px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md</span><span class="v">8px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg</span><span class="v">14px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl</span><span class="v">24px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-full);width:56px"></div><span class="lab">full</span><span class="v">pill</span></div>
  </div>
</body>
</html>
