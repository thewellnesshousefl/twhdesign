<!-- @dsCard group="Type" viewport="700x230" name="Heading scale" subtitle="H1–H3 in Jost; the working headline hierarchy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface); }
  .wrap { padding: 28px 32px; display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-size: 10px; color: var(--text-muted); width: 56px; flex: none; letter-spacing: 0.05em; }
  h1,h2,h3 { margin: 0; font-family: var(--font-display); color: var(--ink); }
  h1 { font-weight: 300; font-size: 48px; letter-spacing: -0.02em; line-height: 1.1; }
  h2 { font-weight: 300; font-size: 36px; letter-spacing: -0.02em; }
  h3 { font-weight: 400; font-size: 24px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">H1 · 48</span><h1>An elevated wellness experience</h1></div>
    <div class="line"><span class="tag">H2 · 36</span><h2>We meet you there</h2></div>
    <div class="line"><span class="tag">H3 · 24</span><h3>Chiropractic &amp; Fascia Release</h3></div>
  </div>
</body>
</html>
