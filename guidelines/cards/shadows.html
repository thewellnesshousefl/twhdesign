<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); }
  .wrap { padding: 30px 32px; display: flex; gap: 28px; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 12px; }
  .box { width: 110px; height: 64px; background: var(--surface); border-radius: var(--radius-md); }
  .lab { font-size: 11px; color: var(--text-body); font-weight: 500; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lab">xs</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab">sm</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lab">md</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab">lg</span></div>
  </div>
</body>
</html>
