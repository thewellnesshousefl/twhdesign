<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Muted, desaturated success / warning / error / info" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .item { border-radius: var(--radius-md); padding: 12px 14px; display:flex; flex-direction:column; gap:6px; }
  .row { display:flex; align-items:center; gap:8px; }
  .dot { width: 12px; height: 12px; border-radius: var(--radius-full); }
  .name { font-size: 13px; font-weight: 600; }
  .hex { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item" style="background:var(--success-bg)"><div class="row"><div class="dot" style="background:var(--success)"></div><span class="name" style="color:var(--success)">success</span></div><span class="hex">#5C7A52</span></div>
    <div class="item" style="background:var(--warning-bg)"><div class="row"><div class="dot" style="background:var(--warning)"></div><span class="name" style="color:var(--warning)">warning</span></div><span class="hex">#B98F3E</span></div>
    <div class="item" style="background:var(--error-bg)"><div class="row"><div class="dot" style="background:var(--error)"></div><span class="name" style="color:var(--error)">error</span></div><span class="hex">#AE564A</span></div>
    <div class="item" style="background:var(--info-bg)"><div class="row"><div class="dot" style="background:var(--info)"></div><span class="name" style="color:var(--info)">info</span></div><span class="hex">#6E8499</span></div>
  </div>
</body>
</html>
