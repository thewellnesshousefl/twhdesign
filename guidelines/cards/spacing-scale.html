<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base rhythm; generous, airy steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface); }
  .wrap { padding: 26px 32px; display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--sage-300); border-radius: var(--radius-xs); width: 100%; }
  .lab { font-size: 10px; color: var(--text-muted); }
  .col span.n { font-size: 11px; color: var(--text-body); font-weight: 500; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col" style="width:28px"><div class="bar" style="height:4px"></div><span class="n">1</span><span class="lab">4</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:8px"></div><span class="n">2</span><span class="lab">8</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:12px"></div><span class="n">3</span><span class="lab">12</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:16px"></div><span class="n">4</span><span class="lab">16</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:24px"></div><span class="n">5</span><span class="lab">24</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:32px"></div><span class="n">6</span><span class="lab">32</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:40px"></div><span class="n">7</span><span class="lab">40</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:48px"></div><span class="n">8</span><span class="lab">48</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:64px"></div><span class="n">9</span><span class="lab">64</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:88px"></div><span class="n">10</span><span class="lab">88</span></div>
  </div>
</body>
</html>
