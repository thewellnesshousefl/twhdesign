<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); }
  .wrap { padding: 24px 32px; }
  .strip { display: flex; gap: 10px; margin-bottom: 14px; }
  .tile { flex: 1; height: 84px; border-radius: var(--radius-md); display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .tile span { font-size: 10px; color: rgba(255,255,255,0.92); letter-spacing: 0.03em; }
  .desc { font-size: 13px; line-height: 1.5; color: var(--ink-soft); max-width: 620px; }
  .desc b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="strip">
      <div class="tile" style="background:linear-gradient(135deg,#d8c3ad,#c08e6f)"><span>skin · hands</span></div>
      <div class="tile" style="background:linear-gradient(135deg,#aeb79c,#6f8060)"><span>sage interiors</span></div>
      <div class="tile" style="background:linear-gradient(135deg,#e7dccb,#bdb4a2)"><span>linen · light</span></div>
      <div class="tile" style="background:linear-gradient(135deg,#8a9685,#45523a)"><span>botanical</span></div>
    </div>
    <p class="desc"><b>Warm, natural light.</b> Intimate and unhurried — hands at work, soft skin, sunlit linen, calm rooms with plants. Shallow depth of field, gentle grain, no hard flash. Warm white balance over cool. People are present but rarely posed.</p>
  </div>
</body>
</html>
