<!-- @dsCard group="Colors" viewport="700x180" name="Sage — primary brand" subtitle="The signature spa-sage ramp; 500 is brand primary" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface); }
  .wrap { padding: 28px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
  .meta { display: flex; gap: 0; margin-top: 10px; }
  .meta div { flex: 1; padding: 0 8px; font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--sage-50)"><span style="color:var(--sage-700)">50</span></div>
      <div class="sw" style="background:var(--sage-100)"><span style="color:var(--sage-700)">100</span></div>
      <div class="sw" style="background:var(--sage-200)"><span style="color:var(--sage-800)">200</span></div>
      <div class="sw" style="background:var(--sage-300)"><span style="color:var(--sage-900)">300</span></div>
      <div class="sw" style="background:var(--sage-400)"><span style="color:#fff">400</span></div>
      <div class="sw" style="background:var(--sage-500)"><span style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--sage-600)"><span style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--sage-700)"><span style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--sage-800)"><span style="color:#fff">800</span></div>
      <div class="sw" style="background:var(--sage-900)"><span style="color:#fff">900</span></div>
    </div>
    <div class="meta"><div>#EDF0E9</div><div></div><div></div><div></div><div></div><div>#6F8060 · primary</div><div></div><div></div><div></div><div>#28301F</div></div>
  </div>
</body>
</html>
