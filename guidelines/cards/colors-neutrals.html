<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — paper & stone" subtitle="Warm off-white grounds and the stone gray-beige ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface); }
  .wrap { padding: 28px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 72px; border-radius: var(--radius-md); border: 1px solid var(--border-soft); }
  .lab { margin-top: 8px; font-size: 11px; color: var(--text-body); font-weight: 500; }
  .hex { font-size: 10px; color: var(--text-muted); letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--mist)"></div><div class="lab">mist</div><div class="hex">#F9F7F2</div></div>
      <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="lab">paper</div><div class="hex">#F4F1EA</div></div>
      <div class="sw"><div class="chip" style="background:var(--linen)"></div><div class="lab">linen</div><div class="hex">#EBE6DB</div></div>
      <div class="sw"><div class="chip" style="background:var(--stone-200)"></div><div class="lab">stone-200</div><div class="hex">#D7D0C2</div></div>
      <div class="sw"><div class="chip" style="background:var(--stone-400)"></div><div class="lab">stone-400</div><div class="hex">#9E9582</div></div>
      <div class="sw"><div class="chip" style="background:var(--stone-600)"></div><div class="lab">stone-600</div><div class="hex">#5F5849</div></div>
    </div>
  </div>
</body>
</html>
