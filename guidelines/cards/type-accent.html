<!-- @dsCard group="Type" viewport="700x200" name="Editorial accent — Cormorant" subtitle="Italic serif reserved for pull-quotes & sanctuary moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--linen); }
  .wrap { padding: 30px 36px; }
  .q { font-family: var(--font-accent); font-style: italic; font-weight: 400; font-size: 34px; line-height: 1.2; color: var(--ink); max-width: 600px; margin: 0; }
  .meta { margin-top: 16px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="q">This space is for those who choose the extraordinary.</p>
    <div class="meta">Cormorant Garamond · italic 400 · used sparingly</div>
  </div>
</body>
</html>
