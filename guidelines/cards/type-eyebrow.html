<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface); }
  .wrap { padding: 32px 36px; display:flex; flex-direction:column; gap: 18px; }
  .eyebrow { font-family: var(--font-body); font-weight: 500; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--brand-strong); }
  .eyebrow.muted { color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <span class="eyebrow">The Wellness House</span>
    <span class="eyebrow muted">Services &amp; Bodywork</span>
  </div>
</body>
</html>
