<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); }
  .wrap { padding: 24px 32px; display: flex; flex-direction: column; gap: 4px; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .tok { font-size: 10px; color: var(--text-muted); width: 96px; flex: none; letter-spacing: 0.03em; }
  .s { font-family: var(--font-display); font-weight: 300; color: var(--ink); white-space: nowrap; line-height: 1.1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="tok">5xl · 88</span><span class="s" style="font-size:40px">Sanctuary</span></div>
    <div class="row"><span class="tok">3xl · 48</span><span class="s" style="font-size:30px">Sanctuary</span></div>
    <div class="row"><span class="tok">2xl · 36</span><span class="s" style="font-size:24px">Sanctuary</span></div>
    <div class="row"><span class="tok">xl · 28</span><span class="s" style="font-size:20px">Sanctuary</span></div>
    <div class="row"><span class="tok">lg · 22</span><span class="s" style="font-size:17px">Sanctuary</span></div>
    <div class="row"><span class="tok">base · 16</span><span class="s" style="font-size:14px">Sanctuary</span></div>
    <div class="row"><span class="tok">sm · 14</span><span class="s" style="font-size:12px">Sanctuary</span></div>
  </div>
</body>
</html>
