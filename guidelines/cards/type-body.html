<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); }
  .wrap { padding: 28px 32px; max-width: 600px; }
  .lead { font-size: 18px; line-height: 1.6; color: var(--ink-soft); font-weight: 400; margin: 0 0 14px; }
  .base { font-size: 16px; line-height: 1.7; color: var(--ink-soft); margin: 0; }
  .meta { margin-top: 16px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lead">We're here for you when you feel great, to help you stay that way.</p>
    <p class="base">And we're here when things feel off, too. Whether it's an auto accident, a recent injury, or the everyday discomfort that slowly gets louder, we'll meet you there.</p>
    <div class="meta">Hanken Grotesk · lead 18 / 1.6 · body 16 / 1.7</div>
  </div>
</body>
</html>
