<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); color: var(--ink); }
  .wrap { padding: 30px 34px; display: flex; flex-direction: column; gap: 26px; }
  .group { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; max-width: 560px; }
  h5 { margin: 0 0 4px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--brand-strong); font-weight: 500; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Input, Select, Checkbox } = window.TheWellnessHouseDesignSystem_3295ce;
    function Demo() {
      const [v, setV] = React.useState('');
      const [svc, setSvc] = React.useState('');
      const [ok, setOk] = React.useState(true);
      return (
        <>
          <div>
            <h5>Buttons</h5>
            <div className="group">
              <Button variant="primary">Book a session</Button>
              <Button variant="secondary">Learn more</Button>
              <Button variant="ghost">Cancel</Button>
              <Button variant="accent">Gift a session</Button>
              <Button variant="dark">Members</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
            <div className="group" style={{ marginTop: '12px' }}>
              <Button variant="primary" size="sm">Small</Button>
              <Button variant="primary" size="md">Medium</Button>
              <Button variant="primary" size="lg">Large</Button>
            </div>
          </div>
          <div>
            <h5>Fields</h5>
            <div className="cols">
              <Input label="Full name" placeholder="Your name" value={v} onChange={(e)=>setV(e.target.value)} />
              <Input label="Email" type="email" error="Enter a valid email" value="hello@" onChange={()=>{}} />
              <Select label="Service" placeholder="Choose a service" value={svc} onChange={(e)=>setSvc(e.target.value)}
                options={['Chiropractic & Fascia Release','Massage & Bodywork','Wellness Consultation']} />
              <Input label="Phone" type="tel" hint="We'll text to confirm" placeholder="(407) 000-0000" value="" onChange={()=>{}} />
            </div>
            <div style={{ marginTop: '18px' }}>
              <Checkbox label="Text me appointment reminders" checked={ok} onChange={(e)=>setOk(e.target.checked)} />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
